version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: webvt_frontend
    restart: always

  api:
    build: ./api
    container_name: webvt_api
    restart: always
    environment:
      - PORT=5000

  nginx:
    image: nginx:alpine
    container_name: webvt_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - api
